name: Theme Check

on:
  push:
    branches: [master]
    paths:
      - 'sections/**'
      - 'assets/**'
  pull_request:
    branches: [master]
    paths:
      - 'sections/**'
      - 'assets/**'

jobs:
  theme-check:
    name: Shopify Theme Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Run Theme Check
        run: shopify theme check --config .theme-check.yml
